; dbus-ads1115 — ADS1115 Tank Sensor Driver for Venus OS
; ========================================================
; This file contains ALL available settings and their defaults.
;
; DO NOT EDIT THIS FILE — create a config.ini file instead and
; override only the values you need. config.ini is preserved across
; firmware updates and PackageManager installs; this file is not.
;
; On first install the setup script creates config.ini automatically
; from this file if no config.ini already exists.


; ---------------------------------------------------------------------------
; [i2c] — I2C bus and ADS1115 chip settings (shared by all sensors)
; ---------------------------------------------------------------------------
[i2c]

; I2C bus number — typically 1 on Raspberry Pi (/dev/i2c-1)
bus = 1

; ADS1115 I2C address — default 0x48 (ADDR pin tied to GND)
;   0x48 → ADDR = GND
;   0x49 → ADDR = VDD
;   0x4A → ADDR = SDA
;   0x4B → ADDR = SCL
address = 0x48

; Supply voltage used for the voltage-divider pull-up resistor
; Raspberry Pi 3.3V rail — do NOT use 5V (ADS1115 analog inputs max 3.3V)
reference_voltage = 3.3


; ---------------------------------------------------------------------------
; [sensor0] — Fresh Water Tank (ADS1115 channel A0)
;
; Wiring:  3.3V ── [220Ω] ── A0 ── [sensor] ── GND
;
; Sensor model A5-E225 (225mm, 0–190Ω):
;   EMPTY = 0Ω   FULL = 190Ω
;
; Channel Assignments:
;   channel 0 (A0) → DeviceInstance 20 → Fresh Water Tank
;   channel 1 (A1) → DeviceInstance 21 → Grey Water Tank
;   channel 2 (A2) → DeviceInstance 22 → (free)
;   channel 3 (A3) → DeviceInstance 23 → (free)
; ---------------------------------------------------------------------------
[sensor0]

type            = tank
enabled         = true
name            = Fresh Water Tank
channel         = 0

; Pull-up resistor to 3.3V in Ohms
fixed_resistor  = 220

; Programmable Gain Amplifier full-scale voltage
; 2.048 is safe for a 3.3V supply — covers 0–2.048V full scale
pga             = 2.048

; Resistance (Ω) of the sensor at EMPTY — initial default
; Refine live from: Settings → Devices → <Tank name> → Setup
; GUI changes persist in com.victronenergy.settings and survive restarts
sensor_min      = 0.0

; Resistance (Ω) of the sensor at FULL — initial default
sensor_max      = 190.0

; Tank volume in the unit chosen by volume_unit
tank_capacity   = 70

; Volume unit for tank_capacity
; Options: liters | cubic_meters | gallons_us | gallons_imp
; The driver converts to m³ for D-Bus; display unit is set system-wide in
; Venus OS at Settings → System setup → Volume unit
volume_unit     = liters

; Fluid type — controls icon and label in the Venus OS GUI
; Options: fresh_water | waste_water | black_water | fuel | diesel |
;          gasoline | oil | hydraulic_oil | live_well | lng | lpg
fluid_type      = fresh_water

; Milliseconds between ADC reads
update_interval = 3000

; Label shown in the VRM Portal device list
product_name    = A5-E225 (0-190Ohm, 225mm)

; Numeric product ID for the VRM Portal (hex or decimal)
product_id      = 0xE225

; --- Low-level alarm (warn when tank runs low) ---
alarm_low_enable  = true
alarm_low_active  = 20
alarm_low_restore = 25


; ---------------------------------------------------------------------------
; [sensor1] — Grey Water Tank (ADS1115 channel A1)
;
; Sensor model A5-E125 (125mm, 0–190Ω):
;   EMPTY = 0Ω   FULL = 190Ω
; ---------------------------------------------------------------------------
[sensor1]

type            = tank
enabled         = true
name            = Grey Water Tank
channel         = 1

fixed_resistor  = 220
pga             = 2.048
sensor_min      = 0.0
sensor_max      = 190.0
tank_capacity   = 70
volume_unit     = liters
fluid_type      = waste_water
update_interval = 3000
product_name    = A5-E125 (0-190Ohm, 125mm)
product_id      = 0xE125

; --- High-level alarm (warn when grey water tank fills up) ---
alarm_high_enable  = true
alarm_high_active  = 90
alarm_high_restore = 85


; ---------------------------------------------------------------------------
; [sensor2] and [sensor3] — additional sensors (disabled by default)
;
; Uncomment and configure to add a third or fourth tank.
; ADS1115 supports up to 4 single-ended channels (A0–A3).
; ---------------------------------------------------------------------------
; [sensor2]
; type            = tank
; enabled         = false
; name            = Fuel Tank
; channel         = 2
; fixed_resistor  = 220
; pga             = 2.048
; sensor_min      = 0.0
; sensor_max      = 190.0
; tank_capacity   = 50
; volume_unit     = liters
; fluid_type      = fuel
; update_interval = 3000
; product_name    = Fuel Tank Sensor
; product_id      = 0xE226

; [sensor3]
; type            = tank
; enabled         = false
; name            = Diesel Tank
; channel         = 3
; fixed_resistor  = 220
; pga             = 2.048
; sensor_min      = 0.0
; sensor_max      = 190.0
; tank_capacity   = 50
; volume_unit     = liters
; fluid_type      = diesel
; update_interval = 3000
; product_name    = Diesel Tank Sensor
; product_id      = 0xE227
