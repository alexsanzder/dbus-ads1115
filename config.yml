# ADS1115 configuration - Dual tank setup (Fresh Water + Grey Water)
i2c:
  bus: 1
  address: 0x48
  reference_voltage: 3.3    # Supply voltage (Raspberry Pi 3.3V)

# Sensors configuration
# =====================
# Each sensor uses a voltage divider circuit:
#   Wiring: 3.3V -- [220Ω] -- ADC channel -- [sensor] -- GND
#
# Sensor Models:
#   - A5-E225: 225mm long resistive level sensor, Range: 0-190Ω
#   - A5-E125: 125mm long resistive level sensor, Range: 0-190Ω
#   - FULL = 190Ω, EMPTY = 0.0Ω (both models use same range)
#
# Channel Assignments:
#   - Channel 0 (A0) → DeviceInstance 20 → Fresh Water Tank
#   - Channel 1 (A1) → DeviceInstance 21 → Grey Water Tank
#
# Volume Units (volume_unit):
#   Specify tank_capacity in any of: liters | cubic_meters | gallons_us | gallons_imp
#   The driver converts to m³ internally — Venus OS always stores capacity in m³.
#   The display unit shown in the GUI is set system-wide on the Cerbo GX at:
#   Settings → System setup → Volume unit  (0=m³, 1=Liters, 2=US gal, 3=Imp gal)
#
# Sensor Calibration (sensor_min / sensor_max):
#   Both values are in Ohms (Ω) — the actual resistance of the sensor at each
#   extreme position. These are the initial defaults used on first install.
#
#   After the sensor appears in the Venus OS GUI, you can refine calibration
#   live from the device Setup page:
#     Settings → Devices → <Tank name> → Setup
#     → "Sensor value when empty" (RawValueEmpty, in Ω)
#     → "Sensor value when full"  (RawValueFull,  in Ω)
#   Changes made in the GUI are persisted in com.victronenergy.settings and
#   will survive a service restart — they take priority over config.yml.
#
# Standard Presets (set via Venus OS GUI, not config.yml):
#   The Setup page also lets you choose a wiring standard:
#     0 = European  (empty = 0 Ω,   full = 180 Ω)  — most EU sensors
#     1 = US        (empty = 240 Ω, full =  30 Ω)  — NMEA / US marine sensors
#     2 = Custom    (uses sensor_min / sensor_max from config or GUI calibration)
#   Selecting European or US automatically overrides sensor_min / sensor_max.
#   Default at first install is Custom (2) — values below apply.
#
# Custom Tank Shape (set via Venus OS GUI, not config.yml):
#   Non-linear tanks (e.g. cylindrical tanks on their side, D-shaped hulls) can
#   be corrected with a custom shape curve:
#     Settings → Devices → <Tank name> → Setup → Custom shape
#   Enter up to 10 "sensor level : volume" point pairs (integers 1-99).
#   Example: "10:5,50:40,80:90" applies an S-curve correction.
#   The curve implicitly passes through 0% → 0% and 100% → 100%.
#   An empty shape string means no correction (linear mapping).
#
sensors:
  # Fresh Water Tank - Channel 0 (A0)
  # Alarm: Warning when level drops below 20%
  - type: tank
    enabled: true
    name: "Fresh Water Tank"
    channel: 0
    fixed_resistor: 220    # Ohms (pull-up to 3.3V)
    pga: 2.048
    sensor_min: 0.0        # Ohms — sensor resistance at EMPTY (Custom standard default)
    sensor_max: 190.0      # Ohms — sensor resistance at FULL  (Custom standard default)
    tank_capacity: 70      # 70 Liters
    volume_unit: liters    # liters | cubic_meters | gallons_us | gallons_imp
    fluid_type: fresh_water
    update_interval: 3000  # milliseconds
    product_name: "A5-E225 (0-190Ω, 225mm)"
    product_id: 0xE225     # Numeric product ID shown in VRM Portal (hex or int)
    alarms:
      low:
        enable: true
        active: 20         # Alarm when level < 20%
        restore: 25        # Clear alarm when level > 25%

  # Grey Water Tank - Channel 1 (A1)
  # Alarm: Warning when level rises above 90% (full tank = bad)
  # NOTE: set enabled: true when the physical sensor is wired to A1
  - type: tank
    enabled: false
    name: "Grey Water Tank"
    channel: 1
    fixed_resistor: 220    # Ohms (pull-up to 3.3V)
    pga: 2.048
    sensor_min: 0.0        # Ohms — sensor resistance at EMPTY (Custom standard default)
    sensor_max: 190.0      # Ohms — sensor resistance at FULL  (Custom standard default)
    tank_capacity: 70      # 70 Liters
    volume_unit: liters    # liters | cubic_meters | gallons_us | gallons_imp
    fluid_type: waste_water
    update_interval: 3000  # milliseconds
    product_name: "A5-E125 (0-190Ω, 125mm)"
    product_id: 0xE125     # Numeric product ID shown in VRM Portal (hex or int)
    alarms:
      high:
        enable: true
        active: 90         # Alarm when level > 90%
        restore: 85        # Clear alarm when level < 85%
