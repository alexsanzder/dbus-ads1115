# ADS1115 configuration - Dual tank setup (Fresh Water + Grey Water)
i2c:
  bus: 1
  address: 0x48
  reference_voltage: 3.3    # Supply voltage (Raspberry Pi 3.3V)
  channel_map: [0, 1, 2, 3]

# Sensors configuration
# =====================
# Each sensor uses a voltage divider circuit:
#   Wiring: 3.3V -- [220Ω] -- ADC channel -- [sensor] -- GND
#
# Sensor Models:
#   - A5-E225: 225mm long resistive level sensor, Range: 0-190Ω
#   - A5-E125: 125mm long resistive level sensor, Range: 0-190Ω
#   - FULL = 190Ω, EMPTY = 0.0Ω (both models use same range)
#
# Channel Assignments:
#   - Channel 0 (A0) → DeviceInstance 20 → Fresh Water Tank
#   - Channel 2 (A2) → DeviceInstance 22 → Grey Water Tank
#
sensors:
  # Fresh Water Tank - Channel 0 (A0)
  - type: tank
    name: "Fresh Water Tank"
    channel: 0
    fixed_resistor: 220    # Ohms (pull-up to 3.3V)
    pga: 2.048
    sensor_min: 0.0        # Ohms (Empty tank)
    sensor_max: 190.0      # Ohms (Full tank)
    tank_capacity: 0.07    # Cubic Meters (0.07 m3 = 70 Liters)
    fluid_type: fresh_water
    update_interval: 3000  # milliseconds
    product_name: "A5-E225 (0-190Ω, 225mm)"

  # Grey Water Tank - Channel 2 (A2)
  - type: tank
    name: "Grey Water Tank"
    channel: 2
    fixed_resistor: 220    # Ohms (pull-up to 3.3V)
    pga: 2.048
    sensor_min: 0.0        # Ohms (Empty tank)
    sensor_max: 190.0      # Ohms (Full tank)
    tank_capacity: 0.07    # Cubic Meters (0.07 m3 = 70 Liters) - Adjust as needed
    fluid_type: waste_water
    update_interval: 3000  # milliseconds
    product_name: "A5-E125 (0-190Ω, 125mm)"
