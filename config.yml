# ADS1115 configuration - Single tank (Fresh Water)
i2c:
  bus: 1
  address: 0x48
  reference_voltage: 3.3    # Supply voltage (Raspberry Pi 3.3V)

# Sensors configuration
# Sensor Model: A5-E225 CLS51012 0-190 26W01
#   - A5-E225: 5" (225mm long) resistive level sensor
#   - Range: 0-190Ω
#   - FULL = 189.8Ω, EMPTY = 0.2Ω
#
# Wiring: 3.3V -- [220Ω] -- ADC channel -- [sensor] -- GND
sensors:
  - type: tank
    name: "Fresh Water Tank"
    channel: 0
    fixed_resistor: 220    # Ohms (pull-up to 3.3V)
    pga: 2.048
    sensor_min: 0.2        # Ohms (Empty tank)
    sensor_max: 189.8      # Ohms (Full tank)
    tank_capacity: 0.07   # Cubic Meters (0.07 m3 = 70 Liters)
    fluid_type: fresh_water
    update_interval: 5000  # milliseconds
    product_name: "A5-E225 Tank Sensor (0-190Ω, 225mm)"
