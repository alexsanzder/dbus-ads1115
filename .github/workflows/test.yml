name: Tests

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  release:
    types: [ created ]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: [3.8, 3.9, 3.10, 3.11, 3.12]

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@v4
      with:
        python-version: ${{ matrix.python-version }}

    - name: Install test dependencies
      run: |
        python -m pip install --upgrade pip
        pip install pytest pytest-mock

    - name: Add package to PYTHONPATH
      run: |
        echo "PYTHONPATH: $PYTHONPATH"
        echo "Adding current directory to PYTHONPATH"
        echo "$PYTHONPATH:$(pwd)" >> $GITHUB_ENV

    - name: Run tests (YAML parser and enums)
      run: |
        pytest tests/test_yaml_parser.py tests/test_enums.py -v --tb=short

    - name: Test summary
      if: always()
      run: |
        echo "Test Summary:"
        echo "- YAML Parser: 25 tests"
        echo "- Enums: 29 tests"
        echo "- Total: 54 tests (all currently passing)"
        echo ""
        echo "All tests passing - ready for release!"

  release-check:
    runs-on: ubuntu-latest
    needs: test
    if: github.event_name == 'release'
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Fail release if tests failed
      if: failure()
      run: |
        echo "Tests failed - blocking release"
        exit 1
