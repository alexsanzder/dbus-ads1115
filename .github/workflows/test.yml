name: Tests

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  release:
    types: [ created ]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: [3.8, 3.9, 3.10, 3.11, 3.12]

    steps:
    - name: Checkout code
      uses: actions/checkout@v3

    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@v4
      with:
        python-version: ${{ matrix.python-version }}

    - name: Install test dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements-test.txt

    - name: Install package dependencies
      run: |
        pip install pygobject  # For D-Bus support
        pip install python-dbus  # For D-Bus support

    - name: Run tests
      run: |
        pytest tests/ -v --tb=short

    - name: Run tests with detailed output on failure
      if: failure()
      run: |
        pytest tests/ -v --tb=long --cov=.

    - name: Upload test results
      if: always()
      uses: actions/upload-artifact@v3
      with:
        name: test-results-python-${{ matrix.python-version }}
        path: |
          .pytest_cache/
        if-no-files-found: warn

  release-check:
    runs-on: ubuntu-latest
    needs: test
    if: github.event_name == 'release'
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v3

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.11'

    - name: Install test dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements-test.txt
        pip install pygobject python-dbus

    - name: Run final tests before release
      run: |
        pytest tests/ -v --tb=short

    - name: Fail release if tests failed
      if: failure()
      run: |
        echo "Tests failed - blocking release"
        exit 1
