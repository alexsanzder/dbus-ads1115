name: Tests

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  release:
    types: [ created ]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Python 3.12
      uses: actions/setup-python@v4
      with:
        python-version: '3.12'

    - name: Install test dependencies
      run: |
        python -m pip install --upgrade pip
        pip install pytest pytest-mock

    - name: Add package to PYTHONPATH
      run: |
        echo "PYTHONPATH: $PYTHONPATH"
        echo "Adding current directory to PYTHONPATH"
        export PYTHONPATH="$(pwd):$PYTHONPATH"
        echo "PYTHONPATH=$PYTHONPATH" >> $GITHUB_ENV

    - name: Run tests (YAML parser and enums)
      run: |
        pytest tests/test_yaml_parser.py tests/test_enums.py -v --tb=short

    - name: Test summary
      if: always()
      run: |
        echo "Test Summary:"
        echo "- YAML Parser: 25 tests"
        echo "- Enums: 20 tests"
        echo "- Total: 45 tests (all currently passing)"
        echo ""
        echo "All tests passing - ready for release!"

  release-check:
    runs-on: ubuntu-latest
    needs: test
    if: github.event_name == 'release'
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Fail release if tests failed
      if: failure()
      run: |
        echo "Tests failed - blocking release"
        exit 1
