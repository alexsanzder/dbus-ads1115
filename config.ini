; dbus-ads1115 — User configuration
; ==================================
; Override only the settings that differ from config.default.ini.
; This file is preserved across firmware updates and PackageManager installs.
;
; See config.default.ini for all available options and their descriptions.


; ---------------------------------------------------------------------------
; [i2c] — Uncomment to override I2C defaults
; ---------------------------------------------------------------------------
; [i2c]
; bus               = 1
; address           = 0x48
; reference_voltage = 3.3


; ---------------------------------------------------------------------------
; [sensor0] — Fresh Water Tank overrides
; ---------------------------------------------------------------------------
[sensor0]
name          = Fresh Water Tank
tank_capacity = 70
volume_unit   = liters
sensor_min    = 0.0
sensor_max    = 190.0


; ---------------------------------------------------------------------------
; [sensor1] — Grey Water Tank overrides
; ---------------------------------------------------------------------------
[sensor1]
name          = Grey Water Tank
tank_capacity = 70
volume_unit   = liters
sensor_min    = 0.0
sensor_max    = 190.0
